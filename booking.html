<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve a Table — Blue Bengal Carshalton</title>
    <meta name="description" content="Book a table online at Blue Bengal, an authentic Indian and Bangladeshi restaurant in Carshalton, Surrey.">
    <link rel="canonical" href="https://bluebengal-carshalton.co.uk/booking.html">
    <link rel="icon" type="image/png" href="img/fevicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="nav-brand">
                <img src="logo.JPG" alt="Blue Bengal logo">
                <span>Blue Bengal</span>
            </a>
            <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html#about-us">About Us</a>
                <a href="index.html#menu">Menu</a>
                <a href="index.html#hours">Opening Hours</a>
                <a href="index.html#contact">Contact</a>
                <a href="booking.html" class="btn btn-gold">Reserve a Table</a>
            </div>
        </nav>
    </header>

    <section class="hero hero-small">
        <img src="img/hero-image.jpg" alt="Blue Bengal restaurant interior">
        <div class="hero-content">
            <span class="eyebrow">Blue Bengal Carshalton</span>
            <h1>Reserve Your Table</h1>
        </div>
    </section>

    <div class="booking-wrap">
        <div class="booking-card">
            <h2>Make a Reservation</h2>
            <p class="section-subtitle">Fill in your details and we'll confirm your booking shortly.</p>

            <form id="bookingForm">
                <div class="field">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" pattern="[0-9]{11}" required>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                        <div class="field-error" id="dateError" hidden></div>
                    </div>
                    <div class="field">
                        <label for="time">Time</label>
                        <select id="time" required></select>
                    </div>
                </div>

                <div class="field">
                    <label for="guests">Number of Guests</label>
                    <select id="guests" required></select>
                </div>

                <div class="field">
                    <label for="notes">Special Requests / Notes (optional)</label>
                    <textarea id="notes" rows="3" maxlength="500" placeholder="e.g. window table, allergies, celebrating an occasion..." style="width:100%; padding:12px 14px; border:1.5px solid var(--cream-alt); border-radius:8px; font-family:inherit; font-size:1rem; background:var(--cream); color:var(--text); resize:vertical;"></textarea>
                </div>

                <div class="field" style="display:flex; align-items:flex-start; gap:10px;">
                    <input type="checkbox" id="marketingConsent" style="margin-top:4px; width:auto;">
                    <label for="marketingConsent" style="font-weight:400; font-size:0.9rem; margin:0;">
                        I'd like to receive occasional emails about offers and special events at Blue Bengal. You can unsubscribe any time. See our
                        <a href="privacy-policy.html" style="color:var(--maroon); text-decoration:underline;" target="_blank">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-gold btn-block">Book Now</button>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 Blue Bengal Carshalton. All Rights Reserved.</p>
        <p>Follow us on <a href="https://www.facebook.com/bluebengal" target="_blank" rel="noopener">Facebook</a></p>
        <p><a href="privacy-policy.html">Privacy Policy</a></p>
    </footer>

    <script>
        document.getElementById("navToggle").addEventListener("click", () => {
            document.getElementById("navLinks").classList.toggle("open");
        });
    </script>
    <script src="script.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
